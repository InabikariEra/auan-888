<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>i auan</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Mitr:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --pink-50: #fff0f5;
      --pink-100: #fce4ec;
      --pink-200: #f8bbd0;
      --pink-300: #f48fb1;
      --pink-400: #f06292;
      --pink-500: #e91e8c;
      --pink-600: #c2185b;
      --text: #5a1a35;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: var(--pink-50);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Sarabun', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .hearts-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .heart-float {
      position: absolute;
      opacity: 0.18;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10% { opacity: 0.18; }
      90% { opacity: 0.18; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }

    .page {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }

    .page.active {
      display: flex;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 3rem 2.5rem;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(240, 98, 146, 0.25);
      position: relative;
      border: 2px solid var(--pink-100);
      animation: cardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .emoji-big {
      font-size: 4.5rem;
      display: block;
      margin-bottom: 1rem;
      animation: bounce 1.8s ease-in-out infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Mitr', sans-serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 0.6rem;
      line-height: 1.35;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #c2185b;
      opacity: 0.7;
      margin-bottom: 1.5rem;
    }

    .body-text {
      color: var(--text);
      font-size: 1.05rem;
      line-height: 1.75;
      opacity: 0.85;
      margin-bottom: 0.5rem;
    }

    .btn {
      font-family: 'Mitr', sans-serif;
      font-size: 1rem;
      padding: 0.7rem 1.8rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
      color: white;
    }

    .btn-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      margin-top: 2rem;
      min-height: 52px;
      position: relative;
    }

    .btn-no,
    .btn-modal-no {
      background: #ffd9e8;
      color: #a31545;
      font-family: 'Mitr', sans-serif;
      padding: 0.7rem 1.8rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      position: relative;
      z-index: 2;
      font-weight: 600;
    }

    .btn-back {
      background: transparent;
      border: none;
      color: #c2185b;
      margin-top: 1rem;
      cursor: pointer;
    }

    .modal-overlay,
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay {
      background: rgba(90, 26, 53, 0.28);
      backdrop-filter: blur(8px);
    }

    .modal-overlay.active,
    .success-overlay.active {
      display: flex;
    }

    .modal {
      background: linear-gradient(135deg, #fff7fb, #ffe4f1);
      border-radius: 32px;
      padding: 2.2rem 2rem;
      width: 88%;
      max-width: 380px;
      text-align: center;
      border: 2px solid var(--pink-300);
      box-shadow: 0 24px 70px rgba(194, 24, 91, 0.25);
      animation: cardIn 0.35s ease;
    }

    .modal h2 {
      color: var(--pink-600);
      font-family: 'Mitr', sans-serif;
      font-size: 1.45rem;
      margin-bottom: 0.7rem;
    }

    .modal p {
      color: var(--text);
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 1.4rem;
    }

    #modalEmoji {
      display: block;
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .success-overlay {
      flex-direction: column;
      background: linear-gradient(135deg,#fce4ec,#fff0f5);
    }

    .confetti-heart {
      position: fixed;
      animation: confettiFall 2.2s ease-in forwards;
      z-index: 300;
    }

    @keyframes confettiFall {
      0% { transform: translateY(-60px); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .dot {
      position: absolute;
      border-radius: 50%;
      background: var(--pink-200);
      opacity: 0.35;
    }
  </style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<div class="page active" id="page1">
  <div class="card">
    <span class="emoji-big">🫣</span>
    <p class="subtitle">เห้ยย มึงอะ</p>
    <p class="body-text">
      กุมีคำถาม ต้องการคำตอบ<br>
      <span style="font-size:0.9rem;opacity:0.6;">กดถัดไปไอ้หมู</span>
    </p>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="goTo(2)">ถัดไปปปปปป</button>
    </div>
  </div>
</div>

<div class="page" id="page2">
  <div class="card">
    <span class="emoji-big">🫠</span>
    <h1>pen fan gu mai i gai????????????</h1>
    <p class="subtitle">rak i auan na</p>
    <p class="body-text">🐖 จะกวนตีนให้ถึงที่สุดเลยยย</p>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="openModal()">จัดไปพี่ชายนายเจลล</button>
      <button class="btn-no" id="p2NoBtn" onmouseover="runawayBtn(this)" ontouchstart="runawayBtn(this)">ไม่</button>
    </div>

    <button class="btn-back" onclick="goTo(1)">← ย้อนกลับ</button>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <span id="modalEmoji">🐖</span>
    <h2>แน่ใจใช่มั้ยย</h2>
    <p>เองจะปวดหัวทุกวันเลยย</p>

    <div class="btn-row">
      <button class="btn btn-primary" onclick="celebrate()">ชัวร์💯💯💯</button>
      <button class="btn-modal-no" id="modalNoBtn" onmouseover="runawayBtn(this)" ontouchstart="runawayBtn(this)">ไม่</button>
    </div>

    <button class="btn-back" onclick="closeModal()">← ย้อนกลับ</button>
  </div>
</div>

<div class="success-overlay" id="successOverlay">
  <span style="font-size:5rem;">🐧</span>
  <h2>เย่่่่</h2>
  <p>ขอบคุณที่ใช้บริการรอบที่5</p>
  <div style="margin-top:1rem;font-size:2rem;">🐖🐧🐖</div>
  <button class="btn" onclick="goHome()">← มันคือปุ่มโฮม</button>
</div>

<script>
const heartsBg = document.getElementById('heartsBg');
const emojis = ['🩷','🐖'];

for (let i = 0; i < 22; i++) {
  const el = document.createElement('div');
  el.className = 'heart-float';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = Math.random() * 100 + 'vw';
  el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
  el.style.animationDuration = (7 + Math.random() * 10) + 's';
  heartsBg.appendChild(el);
}

function goTo(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + n).classList.add('active');
}

function runawayBtn(btn) {
  const x = Math.random() * (window.innerWidth - 120);
  const y = Math.random() * (window.innerHeight - 60);
  btn.style.position = 'fixed';
  btn.style.left = x + 'px';
  btn.style.top = y + 'px';
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function celebrate() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('successOverlay').classList.add('active');
  spawnConfetti();
}

function spawnConfetti() {
  const hearts = ['🩷','🐖','🐧'];

  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-heart';
      el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      el.style.left = Math.random() * 100 + 'vw';
      el.style.fontSize = (1 + Math.random()) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }, i * 60);
  }
}

function goHome() {
  document.getElementById('successOverlay').classList.remove('active');
  goTo(1);
}
</script>

</body>
</html>
